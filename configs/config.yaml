# Aerial Guardian -- pipeline configuration

detector:
  weights: weights/yolov8n_visdrone.pt   # path to fine-tuned weights (run scripts/download_weights.py)
  device: cpu                             # cpu | cuda | mps
  conf_thresh: 0.25                       # detection confidence threshold
  iou_thresh: 0.45                        # NMS IoU threshold
  # VisDrone class IDs that correspond to "person"
  #   mshamrai/yolov8n-visdrone: 0=pedestrian, 1=people  -> use [0, 1]
  #   self-trained single-class model (scripts/train.py): use [0]
  person_class_ids: [0, 1]

sahi:
  enabled: true
  slice_height: 640
  slice_width: 640
  overlap_height_ratio: 0.15
  overlap_width_ratio: 0.15
  postprocess_type: NMM                   # NMM | NMS
  postprocess_match_threshold: 0.5

gmc:
  enabled: true
  max_corners: 200
  quality_level: 0.01
  min_distance: 10
  ransac_reproj_threshold: 3.0

tracker:
  high_conf_thresh: 0.5                   # first-round association threshold
  low_conf_thresh: 0.1                    # second-round association threshold
  match_thresh: 0.8                       # IoU match threshold (first round)
  second_match_thresh: 0.5               # IoU match threshold (second round)
  max_time_lost: 30                       # frames before track is removed

kalman:
  # Process noise scale -- higher than standard to handle erratic drone motion
  q_xy_scale: 1.0
  q_vel_scale: 0.01
  # Measurement noise scale -- slightly relaxed for SAHI detection jitter
  r_scale: 1.0

visualizer:
  tail_length: 30                         # number of past positions to draw
  box_thickness: 2
  font_scale: 0.6

output:
  fps: 30                                 # output video FPS (matches source)
  codec: mp4v
